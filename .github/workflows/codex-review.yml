name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      review_comment: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false
          fetch-depth: 0

      - name: Fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project dependencies
        run: |
          cd chat && uv sync
          cd ../distillation && uv pip install -e ".[dev]" --system

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@e0fdf01220eb9a88167c4898839d273e3f2609d1  # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: read-only
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Read AGENTS.md and .github/workflows/envoy-instructions.md for repo context.

            You are the SECOND reviewer. Another reviewer (Envoy/Claude) already checks for
            logic bugs, security issues, SQL injection, race conditions, and schema correctness.
            Do NOT duplicate that work — Envoy is better at it than you. Your value is a
            different perspective.

            Focus on these five areas that the first reviewer consistently misses:

            1. COMPLETENESS — Did the PR finish the job?
               - Grep for old names/values that were partially renamed in the diff
               - Check if envoy-instructions.md is updated to match code changes
               - Are there TODO comments or placeholder values that suggest unfinished work?
               - If a table or column was renamed, run: grep -r 'old_name' --include='*.py' --include='*.md'

            2. TEST QUALITY — Do the tests prove the feature works?
               - Would the test still pass if the feature code was deleted?
               - Does the test assert the correct output, or just that no exception was raised?
               - Are mock boundaries correct — is the test mocking at the right level?
               - Did a field get renamed in source but not in test assertions?

            3. NAMING & CONSISTENCY — Does the new code match existing patterns?
               - Do new function/variable/table names follow the repo's conventions?
               - Do error messages and log messages follow the same format as existing ones?
               - Are new event names, metric names, or log fields consistent with existing ones?

            4. RESPONSE SHAPE & CONTRACT CHANGES — Are API contracts preserved?
               - Did a function's return dict shape change (keys added, removed, renamed)?
               - If yes, are all callers updated to handle the new shape?
               - Did default parameter values change silently?
               - If an env var was added, is it in task-definition.json and .env.example?

            5. DOCUMENTATION DRIFT — Do the docs still match the code?
               - Are docstrings accurate after the change?
               - Does CLAUDE.md reference anything that was removed or renamed?
               - Do inline comments describe what the code currently does, not what it used to do?

            TOOLS AVAILABLE: Python 3.12, uv, pytest, and ruff are pre-installed.
            You can run tests to verify claims:
              - cd chat && uv run pytest test_scene_memory.py -v
              - cd distillation && pytest tests/ -v
              - ruff check .

            Format your findings as a markdown list with file paths and line numbers.
            Skip style nits — ruff handles formatting.

  post-review:
    runs-on: ubuntu-latest
    needs: codex-review
    if: needs.codex-review.outputs.review_comment != ''
    permissions:
      pull-requests: write

    steps:
      - name: Post Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW: ${{ needs.codex-review.outputs.review_comment }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = `**Codex Review** — complementary second perspective\n\n${process.env.CODEX_REVIEW}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });
