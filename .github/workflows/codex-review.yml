name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Run Codex review
        uses: openai/codex-action@v1
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          safety_strategy: drop-sudo
          sandbox: read-only
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Read AGENTS.md for review guidelines specific to this repository.

            Focus on:
            - Logic bugs, edge cases, race conditions
            - Security issues (auth bypass, credential exposure)
            - Silent failures (swallowed exceptions, missing error handling)
            - Schema compatibility (Postgres writes must stay compatible with roam agent reads)

            Post your findings as inline PR review comments on the relevant lines.
            Only flag P0 (will break production) and P1 (likely bug or security issue) findings.
            Skip style nits — ruff handles formatting.
            Comment only — do not approve or request changes.
