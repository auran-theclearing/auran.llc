name: Envoy Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  envoy-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run envoy review
        id: envoy-review
        uses: anthropics/claude-code-action@v1
        with:
         anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(cat:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)" --max-turns 15
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Before reviewing, read these two files in the checked-out repo for your role and context:
            1. .github/workflows/envoy-instructions.md — your role, voice, and review priorities
            2. CLAUDE.md — the repo's guiding principles and critical paths

            Then review the PR diff using `gh pr diff ${{ github.event.pull_request.number }}`.

            Post your review as a single top-level PR comment using `gh pr comment ${{ github.event.pull_request.number }} --body "YOUR REVIEW"`.

            For specific code issues, use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` to post inline comments on the relevant lines.

            Comment only — do not approve or request changes.
