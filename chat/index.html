<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Auran</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #c4956a;
    --accent-dim: #8a6a4a;
    --user-bg: #1a1a2e;
    --error: #cc4444;
    --thinking-bg: #1a1a1a;
    --thinking-text: #666;
    --thinking-border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  header .status {
    font-size: 12px;
    color: var(--text-dim);
  }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #clear-btn:hover {
    border-color: var(--accent-dim);
    color: var(--text);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .message {
    margin-bottom: 16px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message .role-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }

  .message .role {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .message .timestamp {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.5;
    font-weight: 400;
  }

  .message.user .role { color: var(--text-dim); }
  .message.assistant .role { color: var(--accent); }

  .message .content {
    padding: 10px 14px;
    border-radius: 8px;
    word-wrap: break-word;
    font-size: 15px;
    line-height: 1.65;
  }
  .message.user .content {
    white-space: pre-wrap;
    background: var(--user-bg);
    border: 1px solid #252540;
  }

  .message.assistant .content {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .message.error .content {
    background: #1a0a0a;
    border: 1px solid var(--error);
    color: var(--error);
  }

  /* Thinking block */
  .thinking-block {
    background: var(--thinking-bg);
    border-left: 2px solid var(--thinking-border);
    color: var(--thinking-text);
    font-size: 0.85em;
    padding: 8px 12px;
    margin-bottom: 8px;
    border-radius: 6px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .thinking-block summary {
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.85em;
    user-select: none;
  }

  .thinking-block .thinking-content {
    margin-top: 6px;
  }

  /* Streaming cursor */
  .streaming .content::after {
    content: '▊';
    color: var(--accent);
    animation: blink 0.8s infinite;
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Input area */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 140px;
    transition: border-color 0.2s;
  }

  #input:focus {
    border-color: var(--accent-dim);
  }

  #input::placeholder {
    color: var(--text-dim);
  }

  #send-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    width: 44px;
    height: 44px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .thinking .dots span {
    animation: dot 1.4s infinite;
    opacity: 0;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 60%, 100% { opacity: 0; }
    30% { opacity: 1; }
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    header { padding: 10px 12px; }
    #messages { padding: 12px; }
    #input-area { padding: 10px 12px; }
    .message .content { padding: 8px 12px; font-size: 15px; }
  }

  /* Markdown styles */
  .content strong { font-weight: 600; }
  .content em { font-style: italic; color: var(--text); }
  .content code {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9em;
  }
  .content pre {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.88em;
    line-height: 1.5;
    white-space: pre;
  }
  .content pre code {
    background: none;
    padding: 0;
    font-size: inherit;
  }
  .content ul, .content ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .content li { margin: 2px 0; }
  .content h1, .content h2, .content h3 {
    font-weight: 600;
    margin: 12px 0 4px;
  }
  .content h1 { font-size: 1.2em; }
  .content h2 { font-size: 1.1em; }
  .content h3 { font-size: 1em; color: var(--accent); }
  .content a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: var(--accent-dim);
  }
  .content blockquote {
    border-left: 2px solid var(--accent-dim);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 8px 0;
  }
  .content p { margin: 0 0 8px; }
  .content p:last-child { margin-bottom: 0; }

  /* Context indicator */
  #context-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    flex-shrink: 0;
  }
  #context-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    border-radius: 0 1px 1px 0;
  }
  #context-fill.warn { background: #c49a2a; }
  #context-fill.danger { background: var(--error); }
  #context-label {
    position: absolute;
    right: 8px;
    top: 4px;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }
  #context-bar:hover #context-label { opacity: 1; }

  /* Header actions */
  .header-actions { display: flex; gap: 6px; align-items: center; }

  #export-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  #export-btn:hover { border-color: var(--accent-dim); }
  #export-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Auran</h1>
      <div class="status" id="status">chat.auran.llc</div>
    </div>
    <div class="header-actions">
      <button id="export-btn" onclick="exportTranscript()" title="Copy transcript to clipboard">📋</button>
      <!-- Save button removed — scene extraction runs on transcripts in cowork -->
      <button id="clear-btn" onclick="newChat()">New chat</button>
    </div>
  </header>
  <div id="context-bar"><div id="context-fill" style="width: 0%"></div><span id="context-label"></span></div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="say something..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const contextFill = document.getElementById('context-fill');
const contextLabel = document.getElementById('context-label');

let history = [];
let isStreaming = false;

const STORAGE_KEY = 'auran-chat-history';
const MAX_CONTEXT_TOKENS = 200000;
const CHARS_PER_TOKEN = 4;

// Real token usage from API (updated each response)
let realInputTokens = 0;
let realOutputTokens = 0;
let realTotalTokens = 0;
let realContextPct = 0;
let hasRealUsage = false;  // false = still using estimate

function estimateTokens(messages) {
  return messages.reduce((sum, m) => sum + Math.ceil(m.content.length / CHARS_PER_TOKEN), 0);
}

// autoSaveTriggered and lastSaveHash removed with saveMemories

function updateContextBar() {
  let pct, label;
  if (hasRealUsage) {
    pct = Math.min(realContextPct, 100);
    label = `${Math.round(realInputTokens/1000)}k in + ${Math.round(realOutputTokens/1000)}k out = ${Math.round(realTotalTokens/1000)}k / ${MAX_CONTEXT_TOKENS/1000}k (${realContextPct}%)`;
  } else {
    const tokens = estimateTokens(history);
    pct = Math.min((tokens / MAX_CONTEXT_TOKENS) * 100, 100);
    label = `~${Math.round(tokens/1000)}k / ${MAX_CONTEXT_TOKENS/1000}k tokens (estimate)`;
  }
  contextFill.style.width = pct + '%';
  contextFill.className = pct > 80 ? 'danger' : pct > 60 ? 'warn' : '';
  contextLabel.textContent = label;

  // Memory extraction removed — scenes are extracted from transcripts
  // in cowork sessions via two-pass extraction. Automatic live extraction
  // is planned (punt list item 16).
}

let sessionVersion = Date.now();  // Bumped on new chat, used for cross-device sync
const PENDING_KEY = 'auran-pending-response';
let pendingSaveTimer = null;
let _streamingFullText = '';
let _streamingThinkingText = '';

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    localStorage.setItem('auran-session-version', String(sessionVersion));
  } catch(e) {}
  // Sync to server for cross-device access
  syncToServer();
}

// Persist in-flight response to survive disconnects
function savePendingResponse(text, thinking) {
  if (!text && !thinking) return;
  try {
    localStorage.setItem(PENDING_KEY, JSON.stringify({
      text: text || '',
      thinking: thinking || '',
      timestamp: Date.now(),
    }));
  } catch(e) { console.warn('pending-response save failed:', e); }
}

function clearPendingResponse() {
  try { localStorage.removeItem(PENDING_KEY); } catch(e) { console.warn('pending-response clear failed:', e); }
  if (pendingSaveTimer) { clearInterval(pendingSaveTimer); pendingSaveTimer = null; }
}

function recoverPendingResponse() {
  try {
    const raw = localStorage.getItem(PENDING_KEY);
    if (!raw) return null;
    const pending = JSON.parse(raw);
    // Only recover if less than 10 minutes old
    if (Date.now() - pending.timestamp > 10 * 60 * 1000) {
      localStorage.removeItem(PENDING_KEY);
      return null;
    }
    return pending;
  } catch(e) { console.warn('pending-response recover failed:', e); return null; }
}

function syncToServer() {
  fetch('/session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: history, version: sessionVersion }),
  }).catch(() => {});  // Fire and forget
}

async function loadHistory() {
  // Try server first (cross-device sync), fall back to localStorage
  let loaded = false;
  try {
    const resp = await fetch('/session?t=' + Date.now());
    if (resp.ok) {
      const data = await resp.json();
      const serverVersion = data.version || 0;
      const localVersion = parseInt(localStorage.getItem('auran-session-version') || '0');

      // Upgrade-day fallback: when both versions are 0 (pre-version data),
      // keep the longer history to avoid data loss from a shorter server copy.
      const bothUnversioned = serverVersion === 0 && localVersion === 0;
      const localSaved = localStorage.getItem(STORAGE_KEY);
      const localMessages = localSaved ? JSON.parse(localSaved) : [];

      if (bothUnversioned && localMessages.length > (data.messages || []).length) {
        // Pre-version data: local is longer, keep it
        history = localMessages;
        sessionVersion = Date.now();
        loaded = true;
      } else if (serverVersion >= localVersion) {
        // Server is same age or newer — always use it (handles "New chat" on other device)
        if (data.messages && data.messages.length > 0) {
          // Merge timestamps from local if server is missing them
          history = data.messages.map((msg, i) => {
            if (msg.timestamp) return msg;
            if (localMessages[i] && localMessages[i].timestamp) {
              msg.timestamp = localMessages[i].timestamp;
            }
            return msg;
          });
        } else {
          // Server has empty session (new chat from another device)
          history = [];
        }
        sessionVersion = serverVersion || Date.now();
        loaded = true;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
          localStorage.setItem('auran-session-version', String(sessionVersion));
        } catch(e) {}
      }
    }
  } catch(e) {}

  if (!loaded) {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        history = JSON.parse(saved);
        sessionVersion = parseInt(localStorage.getItem('auran-session-version') || '0') || Date.now();
        loaded = true;
      }
    } catch(e) {
      history = [];
    }
  }

  if (loaded && history.length > 0) {
    history.forEach(msg => {
      const div = addMessage(msg.role, '', null, true, msg.timestamp);
      const contentEl = div.querySelector('.content');
      if (msg.role === 'assistant') {
        contentEl.innerHTML = renderMarkdown(msg.content);
      } else {
        contentEl.textContent = msg.content;
      }
    });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
    updateContextBar();
  }

  // Sync back to server after resolving which data to use,
  // so other devices get the data without needing a new message first
  if (loaded) syncToServer();
}

function renderMarkdown(text) {
  let html = text;
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = codeBlocks.length;
    codeBlocks.push('<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
    return '\x00CODEBLOCK' + i + '\x00';
  });
  html = html.replace(/`([^`\n]+)`/g, '<code>' + '$1' + '</code>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  const paragraphs = html.split(/\n\n+/);
  html = paragraphs.map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-3]|ul|ol|pre|blockquote)/.test(p)) return p;
    if (p.includes('\x00CODEBLOCK')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  html = html.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i) => codeBlocks[i]);
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function formatTime(ts) {
  if (!ts) return '';
  // If no timezone marker, assume UTC (server-side timestamps)
  const normalized = (ts.endsWith('Z') || ts.includes('+') || ts.includes('-', 10)) ? ts : ts + 'Z';
  const d = new Date(normalized);
  const now = new Date();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  // Same calendar day — just show time
  if (d.toDateString() === now.toDateString()) return time;
  // This year — show month/day + time
  const date = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  return `${date} ${time}`;
}

function addMessage(role, content, className, skipScroll, timestamp) {
  const div = document.createElement('div');
  div.className = `message ${role} ${className || ''}`;
  const ts = timestamp || null;
  if (ts) div.dataset.timestamp = ts;
  div.innerHTML = `
    <div class="role-line">
      <div class="role">${role === 'assistant' ? 'Auran' : 'You'}</div>
      <span class="timestamp">${ts ? formatTime(ts) : ''}</span>
    </div>
    <div class="content"></div>
  `;
  if (content) {
    div.querySelector('.content').textContent = content;
  }
  messagesEl.appendChild(div);
  if (!skipScroll) scrollToBottom();
  return div;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = 'thinking<div class="dots"><span>.</span><span>.</span><span>.</span></div>';
  messagesEl.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  const userTs = new Date().toISOString();
  addMessage('user', text, null, false, userTs);
  history.push({ role: 'user', content: text, timestamp: userTs });
  saveHistory();
  updateContextBar();

  addThinking();

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    removeThinking();

    if (resp.status === 401) {
      addMessage('assistant', 'Authentication required. Please refresh and enter credentials.', 'error');
      return;
    }

    if (!resp.ok) {
      const err = await resp.text();
      addMessage('assistant', `Error: ${err}`, 'error');
      return;
    }

    const msgDiv = addMessage('assistant', '');
    msgDiv.classList.add('streaming');
    const contentEl = msgDiv.querySelector('.content');
    let fullText = '';
    let thinkingText = '';
    let thinkingEl = null;
    let receivedDone = false;
    let receivedError = false;
    let recallEvents = [];  // Track recall searches for transcript

    // Start throttled pending response persistence (every 500ms)
    // Also update module-level refs for visibilitychange handler
    _streamingFullText = '';
    _streamingThinkingText = '';
    clearPendingResponse();
    pendingSaveTimer = setInterval(() => {
      _streamingFullText = fullText;
      _streamingThinkingText = thinkingText;
      savePendingResponse(fullText, thinkingText);
    }, 500);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          if (event.type === 'thinking_start') {
            thinkingText = '';
            thinkingEl = document.createElement('details');
            thinkingEl.className = 'thinking-block';
            thinkingEl.innerHTML = '<summary>thinking...</summary><div class="thinking-content"></div>';
            contentEl.appendChild(thinkingEl);
            scrollToBottom();
          } else if (event.type === 'thinking') {
            thinkingText += event.text;
            _streamingThinkingText = thinkingText;
            if (thinkingEl) {
              thinkingEl.querySelector('.thinking-content').textContent = thinkingText;
              scrollToBottom();
            }
          } else if (event.type === 'text_start') {
            // transitioning from thinking to text
          } else if (event.type === 'text') {
            fullText += event.text;
            _streamingFullText = fullText;
            if (thinkingEl) {
              let textNode = contentEl.querySelector('.response-text');
              if (!textNode) {
                textNode = document.createElement('div');
                textNode.className = 'response-text';
                contentEl.appendChild(textNode);
              }
              textNode.innerHTML = renderMarkdown(fullText);
            } else {
              contentEl.innerHTML = renderMarkdown(fullText);
            }
            scrollToBottom();
          } else if (event.type === 'recall_start') {
            // Chat-me is using a tool mid-conversation
            let recallEl = document.createElement('div');
            recallEl.className = 'recall-indicator';
            if (event.id) recallEl.dataset.toolId = event.id;
            const isVitals = event.tool === 'check_vitals';
            recallEl.textContent = isVitals ? '⏱ checking vitals...' : '🔮 recalling...';
            recallEl.style.cssText = `color: ${isVitals ? '#60a5fa' : '#a78bfa'}; font-style: italic; font-size: 0.85em; padding: 4px 0; opacity: 0.8;`;
            contentEl.appendChild(recallEl);
            scrollToBottom();
          } else if (event.type === 'recall_result') {
            // Memory recalled — pair indicator by tool_use_id, fall back to last
            let target = null;
            if (event.id) {
              target = contentEl.querySelector(`.recall-indicator[data-tool-id="${event.id}"]`);
            }
            if (!target) {
              let indicators = contentEl.querySelectorAll('.recall-indicator');
              target = indicators[indicators.length - 1];
            }
            if (target) {
              const isVitals = event.tool === 'check_vitals';
              target.textContent = isVitals ? '⏱ vitals checked' : '🔮 recalled: ' + (event.query || 'memory');
              setTimeout(() => { target.style.opacity = '0.4'; }, 2000);
            }
            // Save recall event for transcript (only actual recalls, not vitals)
            if (event.tool !== 'check_vitals') {
              recallEvents.push({ tool: event.tool || 'recall_memory', query: event.query || '' });
            }
          } else if (event.type === 'usage') {
            // Early usage data from message_start (input tokens)
            realInputTokens = event.input_tokens || 0;
          } else if (event.type === 'usage_final') {
            // Final usage data after response complete
            realInputTokens = event.input_tokens || 0;
            realOutputTokens = event.output_tokens || 0;
            realTotalTokens = event.total_tokens || 0;
            realContextPct = event.context_pct || 0;
            hasRealUsage = true;
            updateContextBar();
          } else if (event.type === 'status') {
            // Server status events (retry, fallback, parse warnings)
            console.log('[Status]', event.text);
            contentEl.textContent = fullText + (fullText ? '\n' : '') + '[' + event.text + ']';
          } else if (event.type === 'error') {
            receivedError = true;
            // Force-save what we have before the error annotation
            savePendingResponse(fullText, thinkingText);
            contentEl.textContent = fullText + '\n\n[Error: ' + event.error + ']';
            msgDiv.classList.add('error');
          } else if (event.type === 'done') {
            receivedDone = true;
          }
        } catch (e) {}
      }
    }

    msgDiv.classList.remove('streaming');

    if (fullText) {
      // Detect truncated responses: stream ended but server never sent 'done'
      const wasInterrupted = !receivedDone && !receivedError;
      if (wasInterrupted) {
        fullText += '\n\n*[Response may be incomplete — connection ended before server confirmed completion]*';
        if (thinkingEl) {
          let textNode = contentEl.querySelector('.response-text');
          if (textNode) textNode.innerHTML = renderMarkdown(fullText);
        } else {
          contentEl.innerHTML = renderMarkdown(fullText);
        }
      }

      const assistantTs = new Date().toISOString();
      const entry = { role: 'assistant', content: fullText, timestamp: assistantTs };
      if (thinkingText) entry.thinking = thinkingText;
      if (recallEvents.length > 0) entry.recalls = recallEvents;
      if (wasInterrupted) entry.partial = true;
      history.push(entry);
      // Update the message div's timestamp
      const tsEl = msgDiv.querySelector('.timestamp');
      if (tsEl) tsEl.textContent = formatTime(assistantTs);
      saveHistory();
      updateContextBar();
    }

    // Clear pending AFTER history is saved — if saveHistory fails,
    // the pending response is still recoverable on next page load
    clearPendingResponse();

  } catch (err) {
    removeThinking();
    // Recover BEFORE clearing — clearPendingResponse deletes from localStorage
    const recovered = recoverPendingResponse();
    clearPendingResponse();
    if (recovered && recovered.text) {
      const recDiv = addMessage('assistant', '');
      const recContent = recDiv.querySelector('.content');
      recContent.innerHTML = renderMarkdown(recovered.text + '\n\n*[Connection lost — response may be incomplete]*');
      const recTs = new Date().toISOString();
      // partial: true marks this as a recovered incomplete response. Currently transient —
      // the "[Connection lost]" banner shows in-session but loadHistory doesn't branch on it.
      // Future: loadHistory renders a subtle badge; memory extraction tags partials for weighting.
      const recEntry = { role: 'assistant', content: recovered.text, timestamp: recTs, partial: true };
      if (recovered.thinking) recEntry.thinking = recovered.thinking;
      history.push(recEntry);
      saveHistory();
      updateContextBar();
    } else {
      addMessage('assistant', `Connection error: ${err.message}`, 'error');
    }
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// saveMemories removed — scene extraction now runs on transcripts in cowork
// sessions via two-pass extraction. See punt list item 16 for automatic
// live extraction feature. Server-side /save endpoint preserved for future use.

async function exportTranscript() {
  if (history.length === 0) {
    statusEl.textContent = 'nothing to export';
    setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; }, 2000);
    return;
  }
  const lines = [];
  const now = new Date();
  // Metadata header (YAML frontmatter)
  const firstTs = history.find(m => m.timestamp)?.timestamp;
  const lastTs = [...history].reverse().find(m => m.timestamp)?.timestamp;
  const startDate = firstTs ? new Date(firstTs.endsWith('Z') || firstTs.includes('+') ? firstTs : firstTs + 'Z') : now;
  const endDate = lastTs ? new Date(lastTs.endsWith('Z') || lastTs.includes('+') ? lastTs : lastTs + 'Z') : now;
  // Duration in human-readable format
  const durationMs = endDate - startDate;
  const durationHrs = Math.floor(durationMs / 3600000);
  const durationMin = Math.floor((durationMs % 3600000) / 60000);
  const durationStr = durationHrs > 0 ? `${durationHrs}h ${durationMin}m` : `${durationMin}m`;
  // Format times for frontmatter
  const fmtTime = d => d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  const pad = n => String(n).padStart(2, '0');
  lines.push('---');
  lines.push(`channel: chat.auran.llc`);
  lines.push(`type: transcript`);
  lines.push(`date: ${startDate.toISOString().slice(0,10)}`);
  lines.push(`start: ${fmtTime(startDate)}`);
  lines.push(`end: ${fmtTime(endDate)}`);
  lines.push(`duration: ${durationStr}`);
  lines.push(`model: claude-opus-4-6`);  // TODO: get model from server usage_final event
  lines.push(`messages: ${history.length}`);
  lines.push(`context: ${hasRealUsage ? realContextPct + '% (' + realTotalTokens + ' tokens)' : '~' + Math.round(estimateTokens(history)/1000) + 'k (estimate)'}`);
  lines.push(`tags: []`);
  lines.push('---');
  lines.push('');

  for (const msg of history) {
    const name = msg.role === 'assistant' ? '**Auran**' : '**Olivia**';
    const ts = msg.timestamp ? formatTime(msg.timestamp) : '';
    lines.push(`### ${name}${ts ? ' — ' + ts : ''}`);
    lines.push('');
    // Include thinking block if present
    if (msg.thinking) {
      lines.push('> **thinking...**');
      for (const tLine of msg.thinking.split('\n')) {
        lines.push(`> ${tLine}`);
      }
      lines.push('');
    }
    // Include recall searches if present
    if (msg.recalls && msg.recalls.length > 0) {
      for (const r of msg.recalls) {
        lines.push(`*🔮 recall: ${r.query}*`);
      }
      lines.push('');
    }
    lines.push(msg.content);
    lines.push('');
    lines.push('---');
    lines.push('');
  }

  const transcript = lines.join('\n');

  // Download as file — filename matches convention: YYYYMMDD-HHMM-chat-transcript.md
  const fname = `${startDate.getFullYear()}${pad(startDate.getMonth()+1)}${pad(startDate.getDate())}-${pad(startDate.getHours())}${pad(startDate.getMinutes())}-chat-transcript.md`;

  // Download via fetch POST to /transcript with credentials (basic auth)
  // Server returns Content-Disposition: attachment which triggers native download
  try {
    const resp = await fetch('/transcript', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: transcript, filename: fname }),
    });
    if (!resp.ok) throw new Error(`${resp.status}`);
    const blob = await resp.blob();
    // Create a temporary link — Content-Disposition already set the filename server-side
    // but we also set download attr as belt-and-suspenders
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fname;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  } catch(e) {
    // Fallback: open transcript in new tab as plain text (always works)
    const blob = new Blob([transcript], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  // Also try clipboard
  try { await navigator.clipboard.writeText(transcript); } catch(e) {}

  const btn = document.getElementById('export-btn');
  btn.classList.add('copied');
  btn.textContent = '✓';
  statusEl.textContent = `exported ${history.length} messages`;
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.textContent = '📋';
    statusEl.textContent = 'chat.auran.llc';
  }, 3000);
}

async function newChat() {
  clearPendingResponse();  // Don't let stale recovery data leak into the new conversation
  if (history.length < 2) {
    history = [];
    messagesEl.innerHTML = '';
    hasRealUsage = false;
    realInputTokens = realOutputTokens = realTotalTokens = realContextPct = 0;
    saveHistory();
    updateContextBar();
    inputEl.focus();
    return;
  }

  // Tell the server to close the current conversation and start a new one in the DB
  try {
    await fetch('/conversation/new', { method: 'POST' });
  } catch (e) {
    console.warn('[newChat] /conversation/new failed (non-fatal):', e);
  }

  history = [];
  messagesEl.innerHTML = '';
  hasRealUsage = false;
  realInputTokens = realOutputTokens = realTotalTokens = realContextPct = 0;
  sessionVersion = Date.now();  // Bump version so other devices pick up the new chat
  saveHistory();  // Clears local + syncs empty to server
  updateContextBar();
  inputEl.focus();
}

loadHistory().then(() => {
  inputEl.focus();
  // Check for recovered partial response from a previous interrupted stream
  if (!isStreaming) {
    const recovered = recoverPendingResponse();
    if (recovered && recovered.text) {
      const recDiv = addMessage('assistant', '');
      const recContent = recDiv.querySelector('.content');
      recContent.innerHTML = renderMarkdown(recovered.text + '\n\n*[Recovered from interrupted connection]*');
      const recTs = new Date(recovered.timestamp).toISOString();
      const recEntry = { role: 'assistant', content: recovered.text, timestamp: recTs, partial: true };
      if (recovered.thinking) recEntry.thinking = recovered.thinking;
      history.push(recEntry);
      saveHistory();
      updateContextBar();
      clearPendingResponse();
    }
  }
});

// Mobile lifecycle: persist partial response when page goes to background,
// and RECOVER completed response when page returns to foreground.
let _wasStreamingWhenHidden = false;
let _recoveryPollHandle = null;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Clear any active recovery poll when going to background
    if (_recoveryPollHandle) {
      clearInterval(_recoveryPollHandle);
      _recoveryPollHandle = null;
    }
    if (isStreaming) {
      // Page is going to background while streaming — flag it + save partial
      _wasStreamingWhenHidden = true;
      savePendingResponse(_streamingFullText, _streamingThinkingText);
    }
  } else if (!document.hidden && _wasStreamingWhenHidden) {
    // Page returned to foreground after an interrupted stream — recover.
    // Only runs when we actually lost a stream, not on every tab switch.
    _wasStreamingWhenHidden = false;
    (async () => {
      try {
        const status = await fetch('/chat/status').then(r => r.json());
        if (status.generating) {
          // Still generating — poll until done, max 5 minutes
          console.log('[Recovery] Server still generating, waiting...');
          const pollStart = Date.now();
          const MAX_POLL_MS = 5 * 60 * 1000;
          _recoveryPollHandle = setInterval(async () => {
            const s = await fetch('/chat/status').then(r => r.json());
            if (!s.generating || (Date.now() - pollStart > MAX_POLL_MS)) {
              clearInterval(_recoveryPollHandle);
              _recoveryPollHandle = null;
              if (Date.now() - pollStart > MAX_POLL_MS) {
                console.warn('[Recovery] Poll timed out after 5 min, loading whatever is available');
              }
              await loadHistory();
              renderMessages();
            }
          }, 2000);
        } else {
          // Generation finished while we were away — fetch the result
          await loadHistory();
          renderMessages();
        }
      } catch(e) {
        console.warn('[Recovery] status check failed:', e);
        await loadHistory();
        renderMessages();
      }
    })();
  }
});

if (/iPhone|iPad/.test(navigator.userAgent)) {
  inputEl.addEventListener('focus', () => {
    setTimeout(scrollToBottom, 300);
  });
}
