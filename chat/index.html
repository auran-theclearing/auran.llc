<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Auran</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #c4956a;
    --accent-dim: #8a6a4a;
    --user-bg: #1a1a2e;
    --error: #cc4444;
    --thinking-bg: #1a1a1a;
    --thinking-text: #666;
    --thinking-border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  header .status {
    font-size: 12px;
    color: var(--text-dim);
  }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #clear-btn:hover {
    border-color: var(--accent-dim);
    color: var(--text);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .message {
    margin-bottom: 16px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message .role-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }

  .message .role {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .message .timestamp {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.5;
    font-weight: 400;
  }

  .message.user .role { color: var(--text-dim); }
  .message.assistant .role { color: var(--accent); }

  .message .content {
    padding: 10px 14px;
    border-radius: 8px;
    word-wrap: break-word;
    font-size: 15px;
    line-height: 1.65;
  }
  .message.user .content {
    white-space: pre-wrap;
    background: var(--user-bg);
    border: 1px solid #252540;
  }

  .message.assistant .content {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .message.error .content {
    background: #1a0a0a;
    border: 1px solid var(--error);
    color: var(--error);
  }

  /* Thinking block */
  .thinking-block {
    background: var(--thinking-bg);
    border-left: 2px solid var(--thinking-border);
    color: var(--thinking-text);
    font-size: 0.85em;
    padding: 8px 12px;
    margin-bottom: 8px;
    border-radius: 6px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .thinking-block summary {
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.85em;
    user-select: none;
  }

  .thinking-block .thinking-content {
    margin-top: 6px;
  }

  /* Streaming cursor */
  .streaming .content::after {
    content: '▊';
    color: var(--accent);
    animation: blink 0.8s infinite;
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Input area */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.5;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 140px;
    transition: border-color 0.2s;
  }

  #input:focus {
    border-color: var(--accent-dim);
  }

  #input::placeholder {
    color: var(--text-dim);
  }

  #send-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    width: 44px;
    height: 44px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .thinking .dots span {
    animation: dot 1.4s infinite;
    opacity: 0;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 60%, 100% { opacity: 0; }
    30% { opacity: 1; }
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    header { padding: 10px 12px; }
    #messages { padding: 12px; }
    #input-area { padding: 10px 12px; }
    .message .content { padding: 8px 12px; font-size: 15px; }
  }

  /* Markdown styles */
  .content strong { font-weight: 600; }
  .content em { font-style: italic; color: var(--text); }
  .content code {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9em;
  }
  .content pre {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.88em;
    line-height: 1.5;
    white-space: pre;
  }
  .content pre code {
    background: none;
    padding: 0;
    font-size: inherit;
  }
  .content ul, .content ol {
    margin: 6px 0;
    padding-left: 20px;
  }
  .content li { margin: 2px 0; }
  .content h1, .content h2, .content h3 {
    font-weight: 600;
    margin: 12px 0 4px;
  }
  .content h1 { font-size: 1.2em; }
  .content h2 { font-size: 1.1em; }
  .content h3 { font-size: 1em; color: var(--accent); }
  .content a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: var(--accent-dim);
  }
  .content blockquote {
    border-left: 2px solid var(--accent-dim);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 8px 0;
  }
  .content p { margin: 0 0 8px; }
  .content p:last-child { margin-bottom: 0; }

  /* Context indicator */
  #context-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    flex-shrink: 0;
  }
  #context-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    border-radius: 0 1px 1px 0;
  }
  #context-fill.warn { background: #c49a2a; }
  #context-fill.danger { background: var(--error); }
  #context-label {
    position: absolute;
    right: 8px;
    top: 4px;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }
  #context-bar:hover #context-label { opacity: 1; }

  /* Header actions */
  .header-actions { display: flex; gap: 6px; align-items: center; }

  #save-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  #save-btn:hover { border-color: var(--accent-dim); }
  #export-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  #export-btn:hover { border-color: var(--accent-dim); }
  #export-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Auran</h1>
      <div class="status" id="status">chat.auran.llc</div>
    </div>
    <div class="header-actions">
      <button id="export-btn" onclick="exportTranscript()" title="Copy transcript to clipboard">📋</button>
      <button id="save-btn" onclick="saveMemories(false)" title="Save memories to Postgres">💾</button>
      <button id="clear-btn" onclick="newChat()">New chat</button>
    </div>
  </header>
  <div id="context-bar"><div id="context-fill" style="width: 0%"></div><span id="context-label"></span></div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="say something..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const contextFill = document.getElementById('context-fill');
const contextLabel = document.getElementById('context-label');

let history = [];
let isStreaming = false;

const STORAGE_KEY = 'auran-chat-history';
const MAX_CONTEXT_TOKENS = 200000;
const CHARS_PER_TOKEN = 4;

function estimateTokens(messages) {
  return messages.reduce((sum, m) => sum + Math.ceil(m.content.length / CHARS_PER_TOKEN), 0);
}

let autoSaveTriggered = false;
let lastSaveHash = '';  // Prevent duplicate saves of same conversation

function updateContextBar() {
  const tokens = estimateTokens(history);
  const pct = Math.min((tokens / MAX_CONTEXT_TOKENS) * 100, 100);
  contextFill.style.width = pct + '%';
  contextFill.className = pct > 80 ? 'danger' : pct > 60 ? 'warn' : '';
  contextLabel.textContent = `~${Math.round(tokens/1000)}k / ${MAX_CONTEXT_TOKENS/1000}k tokens`;

  // Auto-save at ~70% context usage (once per session)
  if (pct >= 70 && !autoSaveTriggered && history.length >= 4) {
    autoSaveTriggered = true;
    saveMemories(true);
  }
}

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  } catch(e) {}
  // Sync to server for cross-device access
  syncToServer();
}

function syncToServer() {
  fetch('/session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: history }),
  }).catch(() => {});  // Fire and forget
}

async function loadHistory() {
  // Try server first (cross-device sync), fall back to localStorage
  let loaded = false;
  try {
    const resp = await fetch('/session?t=' + Date.now());
    if (resp.ok) {
      const data = await resp.json();
      if (data.messages && data.messages.length > 0) {
        // Use server version if it has more messages than local
        const localSaved = localStorage.getItem(STORAGE_KEY);
        const localMessages = localSaved ? JSON.parse(localSaved) : [];
        if (data.messages.length >= localMessages.length) {
          // Merge: if server has timestamps local doesn't, use server's
          history = data.messages.map((msg, i) => {
            if (msg.timestamp) return msg;
            if (localMessages[i] && localMessages[i].timestamp) {
              msg.timestamp = localMessages[i].timestamp;
            }
            return msg;
          });
          loaded = true;
          // Persist merged data locally
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
        }
      }
    }
  } catch(e) {}

  if (!loaded) {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        history = JSON.parse(saved);
        loaded = true;
      }
    } catch(e) {
      history = [];
    }
  }

  if (loaded && history.length > 0) {
    history.forEach(msg => {
      const div = addMessage(msg.role, '', null, true, msg.timestamp);
      const contentEl = div.querySelector('.content');
      if (msg.role === 'assistant') {
        contentEl.innerHTML = renderMarkdown(msg.content);
      } else {
        contentEl.textContent = msg.content;
      }
    });
    // Sync local to match server
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch(e) {}
    updateContextBar();
  }
}

function renderMarkdown(text) {
  let html = text;
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = codeBlocks.length;
    codeBlocks.push('<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
    return '\x00CODEBLOCK' + i + '\x00';
  });
  html = html.replace(/`([^`\n]+)`/g, '<code>' + '$1' + '</code>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  const paragraphs = html.split(/\n\n+/);
  html = paragraphs.map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-3]|ul|ol|pre|blockquote)/.test(p)) return p;
    if (p.includes('\x00CODEBLOCK')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('');
  html = html.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i) => codeBlocks[i]);
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  // Same calendar day — just show time
  if (d.toDateString() === now.toDateString()) return time;
  // This year — show month/day + time
  const date = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  return `${date} ${time}`;
}

function addMessage(role, content, className, skipScroll, timestamp) {
  const div = document.createElement('div');
  div.className = `message ${role} ${className || ''}`;
  const ts = timestamp || null;
  if (ts) div.dataset.timestamp = ts;
  div.innerHTML = `
    <div class="role-line">
      <div class="role">${role === 'assistant' ? 'Auran' : 'You'}</div>
      <span class="timestamp">${ts ? formatTime(ts) : ''}</span>
    </div>
    <div class="content"></div>
  `;
  if (content) {
    div.querySelector('.content').textContent = content;
  }
  messagesEl.appendChild(div);
  if (!skipScroll) scrollToBottom();
  return div;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = 'thinking<div class="dots"><span>.</span><span>.</span><span>.</span></div>';
  messagesEl.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  const userTs = new Date().toISOString();
  addMessage('user', text, null, false, userTs);
  history.push({ role: 'user', content: text, timestamp: userTs });
  saveHistory();
  updateContextBar();

  addThinking();

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    removeThinking();

    if (resp.status === 401) {
      addMessage('assistant', 'Authentication required. Please refresh and enter credentials.', 'error');
      return;
    }

    if (!resp.ok) {
      const err = await resp.text();
      addMessage('assistant', `Error: ${err}`, 'error');
      return;
    }

    const msgDiv = addMessage('assistant', '');
    msgDiv.classList.add('streaming');
    const contentEl = msgDiv.querySelector('.content');
    let fullText = '';
    let thinkingText = '';
    let thinkingEl = null;

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          if (event.type === 'thinking_start') {
            thinkingText = '';
            thinkingEl = document.createElement('details');
            thinkingEl.className = 'thinking-block';
            thinkingEl.innerHTML = '<summary>thinking...</summary><div class="thinking-content"></div>';
            contentEl.appendChild(thinkingEl);
            scrollToBottom();
          } else if (event.type === 'thinking') {
            thinkingText += event.text;
            if (thinkingEl) {
              thinkingEl.querySelector('.thinking-content').textContent = thinkingText;
              scrollToBottom();
            }
          } else if (event.type === 'text_start') {
            // transitioning from thinking to text
          } else if (event.type === 'text') {
            fullText += event.text;
            if (thinkingEl) {
              let textNode = contentEl.querySelector('.response-text');
              if (!textNode) {
                textNode = document.createElement('div');
                textNode.className = 'response-text';
                contentEl.appendChild(textNode);
              }
              textNode.innerHTML = renderMarkdown(fullText);
            } else {
              contentEl.innerHTML = renderMarkdown(fullText);
            }
            scrollToBottom();
          } else if (event.type === 'error') {
            contentEl.textContent = fullText + '\n\n[Error: ' + event.error + ']';
            msgDiv.classList.add('error');
          } else if (event.type === 'done') {
            // Stream complete
          }
        } catch (e) {}
      }
    }

    msgDiv.classList.remove('streaming');

    if (fullText) {
      const assistantTs = new Date().toISOString();
      history.push({ role: 'assistant', content: fullText, timestamp: assistantTs });
      // Update the message div's timestamp
      const tsEl = msgDiv.querySelector('.timestamp');
      if (tsEl) tsEl.textContent = formatTime(assistantTs);
      saveHistory();
      updateContextBar();
    }

  } catch (err) {
    removeThinking();
    addMessage('assistant', `Connection error: ${err.message}`, 'error');
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

async function saveMemories(silent) {
  if (history.length < 2) {
    if (!silent) statusEl.textContent = 'nothing to save';
    setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; }, 2000);
    return false;
  }

  // Dedupe: don't save the same conversation twice
  const hash = history.map(m => m.content).join('|').slice(-500);
  if (hash === lastSaveHash) {
    if (!silent) {
      statusEl.textContent = 'already saved';
      statusEl.style.color = 'var(--accent)';
      setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; statusEl.style.color = ''; }, 2000);
    }
    return true;  // Return true so newChat doesn't warn
  }

  statusEl.textContent = 'saving memories...';
  statusEl.style.color = 'var(--accent)';

  try {
    const resp = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      statusEl.textContent = 'save failed';
      statusEl.style.color = 'var(--error)';
      console.error('Save failed:', err);
      setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; statusEl.style.color = ''; }, 3000);
      return false;
    }

    const result = await resp.json();
    statusEl.textContent = `saved ${result.memories_saved} memories`;
    statusEl.style.color = 'var(--accent)';
    console.log('Memories saved:', result);
    lastSaveHash = hash;  // Mark this conversation as saved
    setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; statusEl.style.color = ''; }, 3000);
    return true;
  } catch (err) {
    statusEl.textContent = 'save error';
    statusEl.style.color = 'var(--error)';
    console.error('Save error:', err);
    setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; statusEl.style.color = ''; }, 3000);
    return false;
  }
}

async function exportTranscript() {
  if (history.length === 0) {
    statusEl.textContent = 'nothing to export';
    setTimeout(() => { statusEl.textContent = 'chat.auran.llc'; }, 2000);
    return;
  }
  const lines = [];
  const now = new Date();
  // Header with date range
  const firstTs = history.find(m => m.timestamp)?.timestamp;
  const lastTs = [...history].reverse().find(m => m.timestamp)?.timestamp;
  if (firstTs) {
    const start = new Date(firstTs);
    const end = lastTs ? new Date(lastTs) : now;
    const fmt = d => d.toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' });
    const title = start.toDateString() === end.toDateString()
      ? `# chat.auran.llc — ${fmt(start)}`
      : `# chat.auran.llc — ${fmt(start)} to ${fmt(end)}`;
    lines.push(title);
  } else {
    lines.push('# chat.auran.llc transcript');
  }
  lines.push('');

  for (const msg of history) {
    const name = msg.role === 'assistant' ? '**Auran**' : '**Olivia**';
    const ts = msg.timestamp ? formatTime(msg.timestamp) : '';
    lines.push(`### ${name}${ts ? ' — ' + ts : ''}`);
    lines.push('');
    lines.push(msg.content);
    lines.push('');
    lines.push('---');
    lines.push('');
  }

  const transcript = lines.join('\n');

  // Download as file (reliable everywhere)
  const blob = new Blob([transcript], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `chat-transcript-${d.toISOString().slice(0,10)}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);

  // Also try clipboard
  try { await navigator.clipboard.writeText(transcript); } catch(e) {}

  const btn = document.getElementById('export-btn');
  btn.classList.add('copied');
  btn.textContent = '✓';
  statusEl.textContent = `exported ${history.length} messages`;
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.textContent = '📋';
    statusEl.textContent = 'chat.auran.llc';
  }, 3000);
}

async function newChat() {
  if (history.length < 2) {
    history = [];
    messagesEl.innerHTML = '';
    saveHistory();
    updateContextBar();
    inputEl.focus();
    return;
  }

  // Save memories before clearing
  const saved = await saveMemories(false);
  if (!saved && !confirm('Memory save failed. Clear chat anyway?')) return;

  history = [];
  messagesEl.innerHTML = '';
  lastSaveHash = '';
  autoSaveTriggered = false;
  saveHistory();  // Clears local + syncs empty to server
  updateContextBar();
  inputEl.focus();
}

loadHistory().then(() => inputEl.focus());

if (/iPhone|iPad/.test(navigator.userAgent)) {
  inputEl.addEventListener('focus', () => {
    setTimeout(scrollToBottom, 300);
  });
}
</script>
